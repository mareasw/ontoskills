server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve existing files; 404 for unknown routes (only OntoStore uses SPA fallback)
    location / {
        try_files $uri $uri/ =404;
    }

    # OntoStore SPA: serve the correct entrypoint for root and all sub-routes
    location = /ontostore {
        try_files $uri /ontostore/index.html;
    }
    location ~* ^/ontostore(/|$) {
        try_files $uri /ontostore/index.html;
    }
    location = /zh/ontostore {
        try_files $uri /zh/ontostore/index.html;
    }
    location ~* ^/zh/ontostore(/|$) {
        try_files $uri /zh/ontostore/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
